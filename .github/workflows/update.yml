name: Auto Update Profile README

on:
  schedule:
    # 6:00 AM IST (00:30 UTC)
    - cron: "30 0 * * *"
    # 9:00 PM IST (15:30 UTC)
    - cron: "30 15 * * *"
  workflow_dispatch:

# 🔥 IMPORTANT — push permission fix
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Dependencies
        run: pip install pytz

      - name: Run Script
        run: python update_readme.py

      - name: Commit and Push
        run: |
          git config --global user.name "akshaycodes009"
          git config --global user.email "akshaycse0@gmail.com"
          git add .
          git diff --cached --quiet || git commit -m "🔄 Auto update README"
          git push          git commit -m "🔄 Auto update README"
          git push
